<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AgriVision AI research demo frontend for plant disease analysis">
    <title>AgriVision AI Research Demo</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="hero card">
            <div class="hero-brand-block">
                <h1>AgriVision</h1>
                <p class="hero-subtitle">Plant Disease Detector</p>
            </div>
        </header>

        <main class="main-grid">
            <section class="card control-card">
                <h2>Input</h2>

                <div class="upload-box" id="uploadBox" role="button" tabindex="0" aria-label="Choose image">
                    <img id="uploadPreviewImage" alt="Selected plant preview">
                    <div class="upload-placeholder" id="uploadPlaceholder">
                        <p class="upload-title">Select Images</p>
                        <p class="upload-subtitle">Tap to open images</p>
                    </div>
                </div>

                <div class="field-grid">
                    <label class="field">
                        <span>Soil Type <span class="required-star">*</span></span>
                        <input type="text" id="soilType" placeholder="e.g., Loamy" required>
                    </label>

                    <label class="field">
                        <span>Temperature <span class="required-star">*</span></span>
                        <input type="number" id="temperature" placeholder="e.g., 28" step="0.1" required>
                    </label>

                    <label class="field">
                        <span>Humidity <span class="required-star">*</span></span>
                        <input type="number" id="humidity" placeholder="e.g., 65" min="0" max="100" step="0.1" required>
                    </label>

                    <label class="field">
                        <span>Moisture <span class="required-star">*</span></span>
                        <input type="number" id="moisture" placeholder="e.g., 40" min="0" max="100" step="0.1" required>
                    </label>
                </div>

                <div class="action-row">
                    <button type="button" class="btn btn-primary" id="analyzeBtn" disabled>
                        <span id="analyzeBtnText">Analyze</span>
                    </button>
                    <button type="button" class="btn btn-ghost" id="clearBtn">Clear</button>
                </div>
                <p class="status-text" id="statusText" aria-live="polite"></p>
            </section>
        </main>

        <div class="selected-chip hidden" id="selectedChip"></div>

        <section class="preset-sheet hidden" id="presetSheet" aria-hidden="true">
            <button type="button" class="preset-sheet-backdrop" id="presetSheetBackdrop" aria-label="Close preset sheet"></button>
            <div class="preset-sheet-panel" role="dialog" aria-modal="true" aria-label="Preset sample picker">
                <div class="preset-sheet-handle" aria-hidden="true"></div>
                <div class="section-row">
                    <h3>Select Images</h3>
                </div>
                <div id="presetCategories" class="preset-categories"></div>
                <button type="button" class="btn btn-ghost sheet-close-btn" id="closePresetSheetBtn">Close</button>
            </div>
        </section>

        <section class="card result-card hidden" id="resultsSection">
            <div class="result-header">
                <h2>Prediction Results</h2>
                <p id="resultMeta">Model output from backend analysis</p>
            </div>

            <div id="topPrediction"></div>
        </section>

        <footer class="site-footer" aria-label="Footer note">
            <p class="footer-note">Model for research purpose only.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
